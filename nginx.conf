# SARRA Production Nginx Configuration
# Spring and River Rejuvenation Authority — Government of Uttarakhand

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# Upstream servers
upstream sarra_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream sarra_dashboard {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream sarra_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sarra.uk.gov.in dashboard.sarra.uk.gov.in api.sarra.uk.gov.in;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Public Frontend — sarra.uk.gov.in
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sarra.uk.gov.in;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/sarra.uk.gov.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarra.uk.gov.in/privkey.pem;

    # TLS 1.2+ only (disable SSLv2, SSLv3, TLS 1.0, 1.1)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (supplement Next.js headers)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide server version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static file caching
    location /_next/static/ {
        proxy_pass http://sarra_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        proxy_pass http://sarra_frontend;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Rate limiting
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://sarra_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

# Admin Dashboard — dashboard.sarra.uk.gov.in
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.sarra.uk.gov.in;

    ssl_certificate /etc/letsencrypt/live/sarra.uk.gov.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarra.uk.gov.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location /_next/static/ {
        proxy_pass http://sarra_dashboard;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://sarra_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API — api.sarra.uk.gov.in
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sarra.uk.gov.in;

    ssl_certificate /etc/letsencrypt/live/sarra.uk.gov.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarra.uk.gov.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    server_tokens off;

    # Request body size limit (for file uploads)
    client_max_body_size 15M;

    # Auth endpoints - strict rate limit
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://sarra_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API - moderate rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://sarra_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Block all other paths
    location / {
        return 404;
    }
}
